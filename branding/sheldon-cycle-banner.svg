  <circle cx="70" cy="215" r="10" fill="#FFFFFF" stroke="#2F6FDB" stroke-width="4"/>
  <circle cx="295" cy="85" r="10" fill="#F59E0B"/>

  <text x="360" y="150" class="title">Sheldon Cycle</text>
